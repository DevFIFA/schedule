<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIFA World Cup 2026 - Fixtures</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0a0a0a;
    color:#fff;
}

/* LIVE BAR */
.live-bar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    background:#b30000;
    color:#fff;
    padding:10px 20px;
    font-weight:bold;
    display:flex;
    justify-content:space-between;
    z-index:1000;
}

.live-dot{
    height:10px;
    width:10px;
    background:#ff0000;
    border-radius:50%;
    display:inline-block;
    margin-right:8px;
    animation:blink 1s infinite;
}

@keyframes blink{
    0%,100%{opacity:1}
    50%{opacity:0.3}
}

header{
    padding:70px 40px 20px;
    border-bottom:2px solid #ffcc00;
}

header h1{
    margin:0;
    font-size:32px;
}

header p{
    color:#aaa;
}

/* SEARCH */
.search{
    padding:20px 40px;
}

.search input{
    width:100%;
    padding:14px;
    background:#111;
    border:1px solid #333;
    color:#fff;
    font-size:16px;
}

/* GROUP */
.group{
    padding:30px 40px;
    border-bottom:1px solid #222;
}

.group h2{
    color:#ffcc00;
}

/* FIXTURE ROW */
.fixture{
    display:grid;
    grid-template-columns:1fr 120px 1fr 160px 200px;
    padding:12px 0;
    border-bottom:1px solid #1f1f1f;
    align-items:center;
}

.team{
    display:flex;
    align-items:center;
    gap:10px;
}

.team img{
    width:22px;
}

.mid{
    text-align:center;
    color:#ffcc00;
    font-weight:bold;
}

.time{
    color:#00d4ff;
    text-align:center;
}

.venue{
    color:#aaa;
    font-size:14px;
}

@media(max-width:900px){
    .fixture{
        grid-template-columns:1fr;
        gap:6px;
    }
}
</style>
</head>

<body>

<!-- LIVE BAR -->
<div class="live-bar">
<div><span class="live-dot"></span> LIVE MATCH CENTER</div>
<div>FIFA World Cup 2026</div>
</div>

<header>
<h1>FIFA WORLD CUP 2026</h1>
<p>Group Stage Fixtures • Times • Venues • Flags</p>
</header>

<div class="search">
<input id="search" placeholder="Search team, venue, group...">
</div>

<div id="container"></div>

<script>

const data = [
{
group:"Group A",
matches:[
["Mexico","mx","South Africa","za","18:00","Estadio Azteca, Mexico City"],
["Korea Republic","kr","Czechia","cz","15:00","Estadio BBVA, Monterrey"],
["Czechia","cz","South Africa","za","20:00","Estadio Azteca, Mexico City"],
["Mexico","mx","Korea Republic","kr","18:00","Estadio BBVA, Monterrey"],
["Czechia","cz","Mexico","mx","19:00","Estadio Azteca, Mexico City"],
["South Africa","za","Korea Republic","kr","21:00","Estadio BBVA, Monterrey"]
]
},

{
group:"Group B",
matches:[
["Canada","ca","Switzerland","ch","18:00","BMO Field, Toronto"],
["Qatar","qa","Bosnia & Herzegovina","ba","15:00","BC Place, Vancouver"],
["Switzerland","ch","Bosnia & Herzegovina","ba","20:00","BMO Field, Toronto"],
["Canada","ca","Qatar","qa","18:00","BC Place, Vancouver"],
["Switzerland","ch","Canada","ca","21:00","BMO Field, Toronto"],
["Bosnia & Herzegovina","ba","Qatar","qa","18:00","BC Place, Vancouver"]
]
},

{
group:"Group C",
matches:[
["Brazil","br","Morocco","ma","21:00","MetLife Stadium, New York"],
["Scotland","gb-sct","Haiti","ht","18:00","SoFi Stadium, Los Angeles"],
["Morocco","ma","Scotland","gb-sct","21:00","MetLife Stadium, New York"],
["Brazil","br","Haiti","ht","18:00","SoFi Stadium, Los Angeles"],
["Brazil","br","Scotland","gb-sct","21:00","MetLife Stadium, New York"],
["Morocco","ma","Haiti","ht","18:00","SoFi Stadium, Los Angeles"]
]
}

];

function render(){
let container=document.getElementById("container");
container.innerHTML="";

data.forEach(g=>{
let html=`<div class="group"><h2>${g.group}</h2>`;

g.matches.forEach(m=>{
html+=`
<div class="fixture">

<div class="team">
<img src="https://flagcdn.com/w20/${m[1]}.png">
${m[0]}
</div>

<div class="mid">VS</div>

<div class="team">
<img src="https://flagcdn.com/w20/${m[3]}.png">
${m[2]}
</div>

<div class="time">${m[4]}</div>

<div class="venue">${m[5]}</div>

</div>
`;
});

html+="</div>";
container.innerHTML+=html;
});
}

render();

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
let q=e.target.value.toLowerCase();

document.querySelectorAll(".group").forEach(g=>{
g.style.display=g.innerText.toLowerCase().includes(q)
?"block":"none";
});
});

</script>

</body>
</html>
