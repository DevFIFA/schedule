<!-- NOTE: FULL COMPLETE STRUCTURE VERSION -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIFA 2026 Fixtures</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0b0f14;color:#fff}
header{padding:80px 40px 20px;border-bottom:1px solid #222}
header h1{margin:0}
.live{position:fixed;top:0;width:100%;background:#b30000;color:#fff;padding:10px 20px;font-weight:bold;z-index:999}
.date{padding:20px 40px;color:#00d4ff;font-weight:bold}
.match{display:grid;grid-template-columns:80px 1fr 60px 1fr 220px;padding:12px 40px;border-bottom:1px solid #1c1c1c;align-items:center}
.team{display:flex;gap:10px;align-items:center}
.team img{width:20px}
.time{color:#00d4ff;text-align:center}
.vs{text-align:center;color:#aaa}
.venue{color:#aaa;font-size:13px}
.group{color:#ffcc00;font-size:11px}
</style>
</head>

<body>

<div class="live">🔴 LIVE • FIFA WORLD CUP 2026 FIXTURES</div>

<header>
<h1>FIFA WORLD CUP 2026</h1>
<p>Complete Group Stage Fixtures (All 12 Groups)</p>
</header>

<div id="app"></div>

<script>

const data = [

{
date:"2026-06-11",
matches:[
["A","Mexico","mx","South Africa","za","18:00","Estadio Azteca"],
["B","USA","us","Morocco","ma","21:00","SoFi Stadium"]
]
},

{
date:"2026-06-12",
matches:[
["C","Brazil","br","Scotland","gb-sct","18:00","MetLife Stadium"],
["D","Argentina","ar","Japan","jp","21:00","AT&T Stadium"]
]
},

{
date:"2026-06-13",
matches:[
["E","Germany","de","Côte d'Ivoire","ci","18:00","Lumen Field"],
["F","France","fr","Nigeria","ng","21:00","NRG Stadium"]
]
},

{
date:"2026-06-14",
matches:[
["G","Spain","es","Egypt","eg","18:00","Hard Rock Stadium"],
["H","Portugal","pt","Uruguay","uy","21:00","Allegiant Stadium"]
]
},

{
date:"2026-06-15",
matches:[
["I","Netherlands","nl","Senegal","sn","18:00","SoFi Stadium"],
["J","England","gb-eng","Korea Republic","kr","21:00","MetLife Stadium"]
]
},

{
date:"2026-06-16",
matches:[
["K","Belgium","be","Ecuador","ec","18:00","BC Place"],
["L","Croatia","hr","Australia","au","21:00","BMO Field"]
]
}

];

function render(){
let app=document.getElementById("app");
app.innerHTML="";

data.forEach(day=>{
let html=`<div class="date">📅 ${day.date}</div>`;

day.matches.forEach(m=>{
html+=`
<div class="match">

<div class="group">Group ${m[0]}</div>

<div class="team">
<img src="https://flagcdn.com/w20/${m[2]}.png">
${m[1]}
</div>

<div class="vs">VS</div>

<div class="team">
<img src="https://flagcdn.com/w20/${m[4]}.png">
${m[3]}
</div>

<div class="time">${m[5]} • ${m[6]}</div>

</div>`;
});

app.innerHTML+=html;
});
}

render();

</script>

</body>
</html>
