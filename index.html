<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIFA World Cup 2026 - Group Stage Fixtures</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0a0a0a;
    color:#fff;
}

header{
    padding:30px 40px;
    border-bottom:2px solid #ffcc00;
    background:#000;
}

header h1{
    margin:0;
    font-size:32px;
}

header p{
    color:#aaa;
}

.search{
    padding:20px 40px;
}

.search input{
    width:100%;
    padding:14px;
    background:#111;
    border:1px solid #333;
    color:#fff;
    font-size:16px;
}

.group{
    padding:30px 40px;
    border-bottom:1px solid #222;
}

.group h2{
    color:#ffcc00;
    margin-bottom:15px;
}

.fixture{
    display:grid;
    grid-template-columns:1fr 80px 1fr;
    padding:10px 0;
    border-bottom:1px solid #1f1f1f;
    align-items:center;
}

.team{
    display:flex;
    align-items:center;
    gap:10px;
}

.team img{
    width:22px;
}

.mid{
    text-align:center;
    color:#ffcc00;
}

</style>
</head>
<body>

<header>
<h1>FIFA WORLD CUP 2026</h1>
<p>Official Group Stage Fixtures (Matchday 1–3)</p>
</header>

<div class="search">
<input id="search" placeholder="Search team...">
</div>

<div id="container"></div>

<script>

const data = [

{
group:"Group A",
matches:[
["Mexico","mx","South Africa","za"],
["Korea Republic","kr","Czechia","cz"],
["Czechia","cz","South Africa","za"],
["Mexico","mx","Korea Republic","kr"],
["Czechia","cz","Mexico","mx"],
["South Africa","za","Korea Republic","kr"]
]
},

{
group:"Group B",
matches:[
["Canada","ca","Bosnia & Herzegovina","ba"],
["Qatar","qa","Switzerland","ch"],
["Switzerland","ch","Bosnia & Herzegovina","ba"],
["Canada","ca","Qatar","qa"],
["Switzerland","ch","Canada","ca"],
["Bosnia & Herzegovina","ba","Qatar","qa"]
]
},

{
group:"Group C",
matches:[
["Brazil","br","Morocco","ma"],
["Haiti","ht","Scotland","gb-sct"],
["Scotland","gb-sct","Morocco","ma"],
["Brazil","br","Haiti","ht"],
["Scotland","gb-sct","Brazil","br"],
["Morocco","ma","Haiti","ht"]
]
},

{
group:"Group D",
matches:[
["USA","us","Paraguay","py"],
["Australia","au","Türkiye","tr"],
["USA","us","Australia","au"],
["Türkiye","tr","Paraguay","py"],
["Türkiye","tr","USA","us"],
["Paraguay","py","Australia","au"]
]
},

{
group:"Group E",
matches:[
["Germany","de","Curaçao","cw"],
["Côte d'Ivoire","ci","Ecuador","ec"],
["Germany","de","Côte d'Ivoire","ci"],
["Ecuador","ec","Curaçao","cw"],
["Curaçao","cw","Côte d'Ivoire","ci"],
["Ecuador","ec","Germany","de"]
]
},

{
group:"Group F",
matches:[
["Netherlands","nl","Japan","jp"],
["Sweden","se","Tunisia","tn"],
["Netherlands","nl","Sweden","se"],
["Tunisia","tn","Japan","jp"],
["Japan","jp","Sweden","se"],
["Tunisia","tn","Netherlands","nl"]
]
},

{
group:"Group G",
matches:[
["Belgium","be","Egypt","eg"],
["Iran","ir","New Zealand","nz"],
["Belgium","be","Iran","ir"],
["New Zealand","nz","Egypt","eg"],
["Egypt","eg","Iran","ir"],
["New Zealand","nz","Belgium","be"]
]
},

{
group:"Group H",
matches:[
["Spain","es","Cabo Verde","cv"],
["Saudi Arabia","sa","Uruguay","uy"],
["Spain","es","Saudi Arabia","sa"],
["Uruguay","uy","Cabo Verde","cv"],
["Cabo Verde","cv","Saudi Arabia","sa"],
["Uruguay","uy","Spain","es"]
]
},

{
group:"Group I",
matches:[
["France","fr","Senegal","sn"],
["Iraq","iq","Norway","no"],
["France","fr","Iraq","iq"],
["Norway","no","Senegal","sn"],
["Norway","no","France","fr"],
["Senegal","sn","Iraq","iq"]
]
},

{
group:"Group J",
matches:[
["Argentina","ar","Algeria","dz"],
["Austria","at","Jordan","jo"],
["Argentina","ar","Austria","at"],
["Jordan","jo","Algeria","dz"],
["Algeria","dz","Austria","at"],
["Jordan","jo","Argentina","ar"]
]
},

{
group:"Group K",
matches:[
["Portugal","pt","Congo DR","cd"],
["Uzbekistan","uz","Colombia","co"],
["Portugal","pt","Uzbekistan","uz"],
["Colombia","co","Congo DR","cd"],
["Colombia","co","Portugal","pt"],
["Congo DR","cd","Uzbekistan","uz"]
]
},

{
group:"Group L",
matches:[
["England","gb-eng","Croatia","hr"],
["Ghana","gh","Panama","pa"],
["England","gb-eng","Ghana","gh"],
["Panama","pa","Croatia","hr"],
["Panama","pa","England","gb-eng"],
["Croatia","hr","Ghana","gh"]
]
}

];

function render(){
let container=document.getElementById("container");
container.innerHTML="";

data.forEach(g=>{

let html=`<div class="group">
<h2>${g.group}</h2>`;

g.matches.forEach(m=>{
html+=`
<div class="fixture">
<div class="team">
<img src="https://flagcdn.com/w20/${m[1]}.png">
${m[0]}
</div>

<div class="mid">VS</div>

<div class="team">
<img src="https://flagcdn.com/w20/${m[3]}.png">
${m[2]}
</div>
</div>
`;
});

html+="</div>";
container.innerHTML+=html;
});

}

render();

document.getElementById("search").addEventListener("input",e=>{
let q=e.target.value.toLowerCase();

document.querySelectorAll(".group").forEach(g=>{
g.style.display=g.innerText.toLowerCase().includes(q)?"block":"none";
});
});

</script>

</body>
</html>
