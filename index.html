<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 Schedule</title>

<style>
:root{
    --bg:#0a0a0a;
    --panel:#111;
    --border:#242424;
    --accent:#ffcc00;
    --text:#f4f4f4;
    --muted:#999;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial,sans-serif;
}

header{
    background:#000;
    border-bottom:2px solid var(--accent);
    padding:25px 40px;
}

header h1{
    font-size:32px;
}

.hero{
    padding:30px 40px;
}

.search{
    width:100%;
    padding:14px;
    background:#1a1a1a;
    color:white;
    border:1px solid #333;
}

.section-title{
    margin:30px 40px 10px;
    font-size:22px;
    color:var(--accent);
}

.fixture-header,
.fixture-row{
    display:grid;
    grid-template-columns:
    110px
    1fr
    100px
    1fr
    250px
    140px;
    align-items:center;
}

.fixture-header{
    background:#161616;
    padding:14px 40px;
    font-weight:bold;
    border-top:1px solid var(--border);
    border-bottom:1px solid var(--border);
}

.fixture-row{
    padding:18px 40px;
    border-bottom:1px solid var(--border);
}

.fixture-row:hover{
    background:#141414;
}

.team{
    display:flex;
    align-items:center;
    gap:10px;
}

.team img{
    width:28px;
}

.time{
    text-align:center;
    color:var(--accent);
    font-weight:bold;
}

.venue{
    color:#ccc;
}

.score{
    text-align:right;
    font-weight:bold;
}

@media(max-width:900px){
    .fixture-header,
    .fixture-row{
        grid-template-columns:1fr;
        gap:8px;
    }

    .score{
        text-align:left;
    }
}
</style>
</head>
<body>

<header>
<h1>FIFA WORLD CUP 2026</h1>
<p>All Fixtures • Teams • Results</p>
</header>

<div class="hero">
<input class="search" placeholder="Search team...">
</div>

<h2 class="section-title">MATCH SCHEDULE</h2>

<div class="fixture-header">
<div>Date</div>
<div>Home</div>
<div>Time</div>
<div>Away</div>
<div>Venue</div>
<div>Score</div>
</div>

<div id="fixtures"></div>

<script>

const fixtures = [

{
date:"Jun 11",
home:"Mexico",
homeFlag:"https://flagcdn.com/w40/mx.png",
away:"South Africa",
awayFlag:"https://flagcdn.com/w40/za.png",
time:"15:00 ET",
venue:"Estadio Azteca",
score:"2 - 0"
},

{
date:"Jun 12",
home:"Canada",
homeFlag:"https://flagcdn.com/w40/ca.png",
away:"Bosnia & Herzegovina",
awayFlag:"https://flagcdn.com/w40/ba.png",
time:"15:00 ET",
venue:"BMO Field",
score:"1 - 1"
},

{
date:"Jun 12",
home:"United States",
homeFlag:"https://flagcdn.com/w40/us.png",
away:"Paraguay",
awayFlag:"https://flagcdn.com/w40/py.png",
time:"21:00 ET",
venue:"SoFi Stadium",
score:"4 - 1"
},

{
date:"Jun 13",
home:"Brazil",
homeFlag:"https://flagcdn.com/w40/br.png",
away:"Morocco",
awayFlag:"https://flagcdn.com/w40/ma.png",
time:"18:00 ET",
venue:"MetLife Stadium",
score:"Upcoming"
},

{
date:"Jun 13",
home:"Scotland",
homeFlag:"https://flagcdn.com/w40/gb-sct.png",
away:"Haiti",
awayFlag:"https://flagcdn.com/w40/ht.png",
time:"21:00 ET",
venue:"Gillette Stadium",
score:"1 - 0"
}

];

const container = document.getElementById("fixtures");

fixtures.forEach(match => {

container.innerHTML += `
<div class="fixture-row">

<div>${match.date}</div>

<div class="team">
<img src="${match.homeFlag}">
${match.home}
</div>

<div class="time">${match.time}</div>

<div class="team">
<img src="${match.awayFlag}">
${match.away}
</div>

<div class="venue">${match.venue}</div>

<div class="score">${match.score}</div>

</div>
`;
});

</script>

</body>
</html>
