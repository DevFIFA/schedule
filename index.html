<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIFA 2026 Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
}

/* LIVE BAR */
.live{
position:fixed;
top:0;
width:100%;
background:#c40000;
padding:10px 16px;
font-weight:bold;
z-index:999;
}

/* HEADER */
header{
padding:80px 40px 20px;
border-bottom:1px solid #222;
}

header h1{margin:0;}

/* DATE */
.date{
padding:20px 40px;
color:#00d4ff;
font-weight:bold;
}

/* MATCH ROW */
.row{
display:grid;
grid-template-columns:90px 1fr 60px 1fr 160px 200px;
padding:12px 40px;
border-bottom:1px solid #1c1c1c;
align-items:center;
}

.team{
display:flex;
gap:8px;
align-items:center;
}

.team img{width:20px;}

.vs{text-align:center;color:#aaa;}
.time{text-align:center;color:#00d4ff;}
.venue{color:#aaa;font-size:13px;}

.group{color:#ffcc00;font-size:11px;}

@media(max-width:900px){
.row{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="live">🔴 FIFA WORLD CUP 2026 • LIVE DASHBOARD ENGINE</div>

<header>
<h1>FIFA 2026 FIXTURE DASHBOARD</h1>
<p>Correct rendering system (plug in official FIFA data)</p>
</header>

<div id="app"></div>

<script>

/* ======================================================
   ⚠️ IMPORTANT:
   Replace ONLY this array with official FIFA fixtures
   ====================================================== */

const FIXTURES = [
/*
FORMAT REQUIRED:

{
date:"2026-06-11",
group:"A",
home:"Mexico",
homeCode:"mx",
away:"South Africa",
awayCode:"za",
time:"18:00",
venue:"Estadio Azteca"
}
*/
];

/* GROUP BY DATE */
function group(data){
let map={};
data.forEach(m=>{
if(!map[m.date]) map[m.date]=[];
map[m.date].push(m);
});
return map;
}

/* RENDER */
function render(data){

let app=document.getElementById("app");
app.innerHTML="";

Object.keys(data).sort().forEach(date=>{

let html=`<div class="date">📅 ${date}</div>`;

data[date].forEach(m=>{

html+=`
<div class="row">

<div class="group">Group ${m.group}</div>

<div class="team">
<img src="https://flagcdn.com/w20/${m.homeCode}.png">
${m.home}
</div>

<div class="vs">VS</div>

<div class="team">
<img src="https://flagcdn.com/w20/${m.awayCode}.png">
${m.away}
</div>

<div class="time">${m.time}</div>

<div class="venue">${m.venue}</div>

</div>
`;
});

app.innerHTML+=html;
});
}

/* INIT */
render(group(FIXTURES));

</script>

</body>
</html>
