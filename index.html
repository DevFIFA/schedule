<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIFA World Cup 2026 - Fixtures</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0a0a0a;
    color:#fff;
}

/* LIVE BAR */
.live-bar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    background:#b30000;
    color:#fff;
    padding:10px 20px;
    font-weight:bold;
    display:flex;
    justify-content:space-between;
    z-index:1000;
}

.live-dot{
    height:10px;
    width:10px;
    background:#ff0000;
    border-radius:50%;
    display:inline-block;
    margin-right:8px;
    animation:blink 1s infinite;
}

@keyframes blink{
    0%,100%{opacity:1}
    50%{opacity:0.3}
}

header{
    padding:70px 40px 20px;
    border-bottom:2px solid #ffcc00;
}

header h1{
    margin:0;
    font-size:32px;
}

header p{
    color:#aaa;
}

.search{
    padding:20px 40px;
}

.search input{
    width:100%;
    padding:14px;
    background:#111;
    border:1px solid #333;
    color:#fff;
    font-size:16px;
}

/* DATE SECTION */
.date-section{
    padding:10px 40px 0;
}

.date-title{
    color:#00d4ff;
    font-size:18px;
    margin:30px 0 10px;
    border-left:4px solid #00d4ff;
    padding-left:10px;
}

/* FIXTURE ROW */
.fixture{
    display:grid;
    grid-template-columns:1fr 120px 1fr 80px 160px;
    padding:12px 0;
    border-bottom:1px solid #1f1f1f;
    align-items:center;
}

.group{
    color:#ffcc00;
    font-size:12px;
}

.team{
    display:flex;
    align-items:center;
    gap:10px;
}

.team img{
    width:22px;
}

.mid{
    text-align:center;
    color:#ffcc00;
    font-weight:bold;
}

.time{
    color:#00d4ff;
    text-align:center;
}

.venue{
    color:#aaa;
    font-size:13px;
}

@media(max-width:900px){
    .fixture{
        grid-template-columns:1fr;
        gap:6px;
    }
}
</style>
</head>

<body>

<!-- LIVE BAR -->
<div class="live-bar">
<div><span class="live-dot"></span> LIVE MATCH CENTER</div>
<div>FIFA World Cup 2026</div>
</div>

<header>
<h1>FIFA WORLD CUP 2026</h1>
<p>Fixtures grouped by date • Group Stage schedule</p>
</header>

<div class="search">
<input id="search" placeholder="Search team, venue, group or date...">
</div>

<div id="container"></div>

<script>

const data = [
{
date:"2026-06-11",
matches:[
["Group A","Mexico","mx","South Africa","za","18:00","Estadio Azteca, Mexico City"],
["Group B","Canada","ca","Switzerland","ch","21:00","BMO Field, Toronto"]
]
},

{
date:"2026-06-12",
matches:[
["Group C","Brazil","br","Morocco","ma","18:00","MetLife Stadium, New York"],
["Group D","USA","us","Paraguay","py","21:00","SoFi Stadium, Los Angeles"]
]
},

{
date:"2026-06-13",
matches:[
["Group E","Germany","de","Côte d'Ivoire","ci","18:00","AT&T Stadium, Dallas"],
["Group F","Netherlands","nl","Japan","jp","21:00","Lumen Field, Seattle"]
]
}

];

function render(){
const container=document.getElementById("container");
container.innerHTML="";

data.forEach(day=>{

let html=`<div class="date-section">
<div class="date-title">📅 ${day.date}</div>
`;

day.matches.forEach(m=>{

html+=`
<div class="fixture">

<div class="group">${m[0]}</div>

<div class="team">
<img src="https://flagcdn.com/w20/${m[2]}.png">
${m[1]}
</div>

<div class="mid">VS</div>

<div class="team">
<img src="https://flagcdn.com/w20/${m[4]}.png">
${m[3]}
</div>

<div class="time">
${m[5]} • ${m[6]}
</div>

</div>
`;
});

html+="</div>";
container.innerHTML+=html;
});

}

render();

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
let q=e.target.value.toLowerCase();

document.querySelectorAll(".date-section").forEach(section=>{
section.style.display=
section.innerText.toLowerCase().includes(q)
?"block":"none";
});
});

</script>

</body>
</html>
