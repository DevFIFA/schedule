<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIFA World Cup 2026 | Fixtures Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0b0f14;
    --panel:#0f1620;
    --line:#1e2a38;
    --accent:#00d4ff;
    --gold:#ffcc00;
    --text:#e8edf2;
    --muted:#8aa0b6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
}

/* ===== LIVE BAR ===== */
.live-bar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    background:linear-gradient(90deg,#b30000,#ff1e1e);
    color:#fff;
    padding:10px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:600;
    z-index:9999;
    box-shadow:0 4px 20px rgba(0,0,0,0.5);
}

.live-dot{
    width:8px;
    height:8px;
    background:#fff;
    border-radius:50%;
    display:inline-block;
    margin-right:8px;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%,100%{opacity:1}
    50%{opacity:.3}
}

/* ===== HEADER ===== */
header{
    padding:90px 40px 25px;
    background:
        radial-gradient(circle at top,#13202e,#0b0f14);
    border-bottom:1px solid var(--line);
}

header h1{
    font-size:34px;
    font-weight:700;
    letter-spacing:1px;
}

header p{
    color:var(--muted);
    margin-top:6px;
}

/* ===== SEARCH ===== */
.search{
    padding:20px 40px;
}

.search input{
    width:100%;
    padding:14px 16px;
    background:var(--panel);
    border:1px solid var(--line);
    color:#fff;
    border-radius:10px;
    font-size:15px;
    outline:none;
}

/* ===== DATE SECTION ===== */
.date-section{
    padding:10px 40px;
}

.date-title{
    margin:25px 0 10px;
    font-size:15px;
    color:var(--accent);
    font-weight:600;
    display:flex;
    align-items:center;
    gap:10px;
}

/* ===== FIXTURE ROW ===== */
.fixture{
    display:grid;
    grid-template-columns:90px 1fr 70px 1fr 160px 200px;
    gap:10px;
    padding:14px 12px;
    border-bottom:1px solid var(--line);
    align-items:center;
    transition:.2s;
}

.fixture:hover{
    background:#0f1a25;
}

.group-tag{
    font-size:11px;
    color:var(--gold);
    font-weight:600;
}

.team{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:500;
}

.team img{
    width:20px;
    height:14px;
    border-radius:2px;
}

.vs{
    text-align:center;
    color:var(--muted);
    font-weight:600;
}

.time{
    color:var(--accent);
    font-weight:600;
    text-align:center;
}

.venue{
    color:var(--muted);
    font-size:13px;
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
    .fixture{
        grid-template-columns:1fr;
        gap:6px;
    }

    .vs,.time{
        text-align:left;
    }
}
</style>
</head>

<body>

<!-- LIVE BAR -->
<div class="live-bar">
<div><span class="live-dot"></span> LIVE • FIFA WORLD CUP 2026 FIXTURE HUB</div>
<div>Group Stage • All 48 Teams</div>
</div>

<header>
<h1>FIFA WORLD CUP 2026</h1>
<p>Premium Fixture Dashboard • Group Stage (A–L) • Times • Venues • Flags</p>
</header>

<div class="search">
<input id="search" placeholder="Search team, group, venue, or date...">
</div>

<div id="app"></div>

<script>

/* ===============================
   FULL STRUCTURE READY FOR DATA
   =============================== */

const fixtures = [

/* GROUP A */
{
date:"2026-06-11",
matches:[
["Group A","Mexico","mx","South Africa","za","18:00","Estadio Azteca, Mexico City"],
["Group A","Canada","ca","Korea Republic","kr","21:00","BMO Field, Toronto"]
]
},

/* GROUP B */
{
date:"2026-06-12",
matches:[
["Group B","USA","us","Morocco","ma","18:00","SoFi Stadium, Los Angeles"],
["Group B","Switzerland","ch","Qatar","qa","21:00","BC Place, Vancouver"]
]
},

/* GROUP C */
{
date:"2026-06-13",
matches:[
["Group C","Brazil","br","Scotland","gb-sct","18:00","MetLife Stadium, New York"],
["Group C","Haiti","ht","Morocco","ma","21:00","AT&T Stadium, Dallas"]
]
}

];

/* ===============================
   RENDER FUNCTION
   =============================== */

function render(data){

const app=document.getElementById("app");
app.innerHTML="";

data.forEach(day=>{

let html=`
<div class="date-section">
<div class="date-title">📅 ${day.date}</div>
`;

day.matches.forEach(m=>{

html+=`
<div class="fixture">

<div class="group-tag">${m[0]}</div>

<div class="team">
<img src="https://flagcdn.com/w20/${m[2]}.png">
${m[1]}
</div>

<div class="vs">VS</div>

<div class="team">
<img src="https://flagcdn.com/w20/${m[4]}.png">
${m[3]}
</div>

<div class="time">${m[5]}</div>

<div class="venue">${m[6]}</div>

</div>
`;
});

html+=`</div>`;
app.innerHTML+=html;

});

}

render(fixtures);

/* ===============================
   SEARCH FILTER
   =============================== */

document.getElementById("search").addEventListener("input",e=>{

let q=e.target.value.toLowerCase();

document.querySelectorAll(".date-section").forEach(sec=>{
sec.style.display=
sec.innerText.toLowerCase().includes(q)
?"block":"none";
});

});

</script>

</body>
</html>
